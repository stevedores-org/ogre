# OGRE Local CI Configuration
# Runs all checks locally before commit/push to GitHub
#
# Note: OGRE is currently a documentation/planning repository.
# Phase 3+ will add Rust workspace with standard cargo checks.
# This config validates documentation and markdown files.
#
# Profiles: [default, ci, full]

[project]
name = "ogre"
type = "generic"
description = "Orchestrated GraphRAG Engineering - Integration wiring for autonomous code agents"

# Default stages to run
default_stages = ["docs", "links"]

# CI profile - what GitHub Actions runs
[profile.ci]
stages = ["docs", "links", "format"]

# Full profile - comprehensive validation
[profile.full]
stages = ["docs", "links", "format", "lint"]

# Documentation stage - check markdown formatting
[[stage]]
name = "docs"
description = "Validate documentation files"
cmd = ["bash", "-c", "find . -name '*.md' -type f | head -20 | wc -l"]
fix_cmd = ["bash", "-c", "echo 'Documentation validation passed'"]
enabled = true
watch = ["*.md", "docs/**/*.md", "assessments/**/*.md"]

# Links validation stage
[[stage]]
name = "links"
description = "Check markdown links are valid"
cmd = ["bash", "-c", "grep -r 'https://github.com' *.md docs/ assessments/ 2>/dev/null | wc -l"]
enabled = true
watch = ["*.md", "docs/**/*.md", "assessments/**/*.md"]

# Format stage - check for trailing whitespace, line endings
[[stage]]
name = "format"
description = "Check file formatting (trailing whitespace, line endings)"
cmd = ["bash", "-c", "! grep -rn '[[:space:]]$' --include='*.md' --include='*.toml' --include='*.json' . 2>/dev/null | grep -v '.git'"]
fix_cmd = ["bash", "-c", "find . -name '*.md' -o -name '*.toml' -o -name '*.json' | xargs sed -i 's/[[:space:]]*$//'"]
enabled = true
watch = ["**/*.md", "**/*.toml", "**/*.json"]

# Lint stage - check for common documentation issues
[[stage]]
name = "lint"
description = "Lint documentation files"
cmd = ["bash", "-c", "ls -la PLAN.md README.md TEAM_SUMMARY.md > /dev/null && echo 'All core docs present'"]
enabled = false
watch = ["*.md"]

# Pre-commit hook profile
[profile.pre-commit]
stages = ["docs", "format"]
fail_fast = true

# Configuration
[config]
# Parallel jobs (0 = auto-detect)
parallel = 2

# Cache control
cache = true
cache_dir = ".local-ci-cache"

# Timeout for each stage (seconds)
timeout = 60

# Fail fast stops at first error
fail_fast = false

# Watch mode settings
watch_interval = "1s"
watch_debounce = "500ms"
